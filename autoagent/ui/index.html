<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobAgent — Apply automatically</title>
  <meta name="description" content="AI agent that logs into LinkedIn and applies to jobs on your behalf."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #2a2a2a;
      --accent:  #7c3aed;
      --text:    #e8e8e8;
      --muted:   #555;
      --green:   #22c55e;
      --red:     #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header { margin-bottom: 40px; }
    .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .header p  { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* Section label */
    .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* Inputs */
    .group { margin-bottom: 24px; }

    input, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Counter */
    .counter {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .counter input {
      width: 64px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 8px;
    }
    .counter-desc { font-size: 13px; color: var(--muted); }
    .ctr-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 16px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .ctr-btn:hover { background: var(--border); }

    /* Divider */
    hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    /* Button */
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Log */
    .log-wrap { margin-top: 28px; display: none; }
    .log-wrap.show { display: block; }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 50% { opacity: 0.3; } }

    .log-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      height: 280px;
      overflow-y: auto;
      font-size: 12.5px;
      font-family: 'Courier New', monospace;
      line-height: 1.85;
    }

    .l { animation: fadeIn 0.2s; }
    .l-ok   { color: var(--green); }
    .l-err  { color: var(--red); }
    .l-dim  { color: var(--muted); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-n { font-size: 22px; font-weight: 600; }
    .stat-l { font-size: 11px; color: var(--muted); margin-top: 2px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>JobAgent</h1>
    <p>Paste your profile. Walk away. Agent applies for you.</p>
  </div>

  <!-- Credentials -->
  <div class="group">
    <div class="label">LinkedIn Login</div>
    <div class="row" style="margin-bottom:10px;">
      <input type="email" id="email" placeholder="Email"/>
      <input type="password" id="password" placeholder="Password"/>
    </div>
    <input type="url" id="linkedin-url" placeholder="https://linkedin.com/in/your-name"/>
  </div>

  <hr/>

  <!-- Resume -->
  <div class="group">
    <div class="label">Your Resume / Profile</div>
    <textarea id="resume" placeholder="Role: UI/UX Designer&#10;Skills: Figma, Adobe XD, Prototyping&#10;Experience: 1 year at XYZ Studio&#10;Education: B.Des 2024"></textarea>
  </div>

  <hr/>

  <!-- Job count -->
  <div class="group">
    <div class="label">Jobs to Apply</div>
    <div class="counter">
      <button class="ctr-btn" onclick="adj(-5)">−</button>
      <input type="number" id="num" value="10" min="1" max="50"/>
      <button class="ctr-btn" onclick="adj(5)">+</button>
      <span class="counter-desc">Easy Apply jobs</span>
    </div>
  </div>

  <button class="btn" id="btn" onclick="launch()">Launch Agent</button>

  <!-- Live output -->
  <div class="log-wrap" id="logwrap">
    <div class="log-header">
      <div class="label" style="margin:0">Live Feed</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="dot" id="dot"></div>
        <span id="status-text" style="font-size:12px;color:var(--muted)">Running</span>
      </div>
    </div>
    <div class="log-box" id="log"></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-n" id="n-applied" style="color:var(--green)">0</div>
        <div class="stat-l">Applied</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="n-skipped" style="color:var(--muted)">0</div>
        <div class="stat-l">Skipped</div>
      </div>
    </div>
  </div>

</div>
<script>
  // Point to backend — change this if deploying remotely
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8001'
    : 'https://job-hunting-agent-production-b9a5.up.railway.app';

  let applied = 0, skipped = 0;

  function adj(d) {
    const el = document.getElementById('num');
    el.value = Math.max(1, Math.min(50, +el.value + d));
  }

  function cls(msg) {
    if (/✅|Applied/.test(msg)) return 'l-ok';
    if (/❌|Error|Failed/.test(msg)) return 'l-err';
    if (/⏭|⚠️|Skipped/.test(msg)) return 'l-dim';
    return '';
  }

  function addLine(msg) {
    const box = document.getElementById('log');
    const d = document.createElement('div');
    d.className = `l ${cls(msg)}`;
    d.textContent = msg;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;

    const m = msg.match(/\[(\d+)\//);
    if (m) { applied = +m[1]; document.getElementById('n-applied').textContent = applied; }
    if (/Skipped/.test(msg)) { skipped++; document.getElementById('n-skipped').textContent = skipped; }
  }

  async function launch() {
    const email  = document.getElementById('email').value.trim();
    const pass   = document.getElementById('password').value.trim();
    const url    = document.getElementById('linkedin-url').value.trim();
    const resume = document.getElementById('resume').value.trim();
    const n      = +document.getElementById('num').value;

    if (!email || !pass || !url || !resume) { alert('Fill in all fields.'); return; }

    document.getElementById('logwrap').classList.add('show');
    document.getElementById('log').innerHTML = '';
    applied = skipped = 0;
    document.getElementById('n-applied').textContent = '0';
    document.getElementById('n-skipped').textContent = '0';
    document.getElementById('status-text').textContent = 'Running';
    document.getElementById('dot').style.background = 'var(--green)';

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Agent running…';

    addLine('Starting agent…');

    try {
      const res = await fetch(`${API}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, linkedin_url: url, resume_text: resume, num_jobs: n })
      });
      const { session_id } = await res.json();

      const es = new EventSource(`${API}/logs/${session_id}`);
      es.onmessage = e => {
        if (e.data === '__DONE__') {
          es.close();
          document.getElementById('status-text').textContent = 'Done';
          document.getElementById('dot').style.animation = 'none';
          document.getElementById('dot').style.background = '#555';
          btn.disabled = false;
          btn.textContent = 'Launch Agent';
        } else {
          addLine(e.data);
        }
      };
      es.onerror = () => { addLine('Connection lost.'); es.close(); btn.disabled = false; btn.textContent = 'Launch Agent'; };
    } catch (e) {
      addLine(`Error: ${e.message}`);
      addLine('Is the backend running on port 8001?');
      btn.disabled = false;
      btn.textContent = 'Launch Agent';
    }
  }
</script>
</body>
</html>
